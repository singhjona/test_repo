<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Agentic Mongo Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050712;
        --bg-elevated: #0d1024;
        --bg-elevated-softer: #11152b;
        --accent: #46c2ff;
        --accent-soft: rgba(70, 194, 255, 0.16);
        --accent-strong: #38a6da;
        --danger: #ff4f6d;
        --success: #54e9b5;
        --text: #f5f7ff;
        --text-muted: #9aa0c6;
        --border-subtle: #272c4a;
        --shadow-soft: 0 18px 40px rgba(3, 7, 28, 0.85);
        --radius-lg: 18px;
        --radius-md: 12px;
        --radius-pill: 999px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: radial-gradient(circle at top left, #182340, #050712 60%);
        color: var(--text);
        font-family: "Plus Jakarta Sans", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: stretch;
      }

      #app {
        max-width: 1320px;
        width: 100%;
        padding: 18px 18px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      header.top-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-radius: var(--radius-lg);
        background: linear-gradient(
          120deg,
          rgba(70, 194, 255, 0.1),
          rgba(39, 44, 74, 0.6),
          rgba(6, 10, 35, 0.95)
        );
        box-shadow: var(--shadow-soft);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 12px;
        background: radial-gradient(circle at 30% 20%, #ffffff, #46c2ff 40%, #070b2a 80%);
        position: relative;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }

      .brand-mark::before,
      .brand-mark::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      .brand-mark::before {
        inset: 8px 7px;
        border-left-color: transparent;
      }

      .brand-mark::after {
        inset: 10px 8px;
        border-right-color: transparent;
        opacity: 0.6;
      }

      .brand-text-title {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .brand-text-subtitle {
        font-size: 12px;
        color: var(--text-muted);
      }

      .nav-controls {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .pill {
        border-radius: var(--radius-pill);
        padding: 6px 12px;
        background: rgba(7, 11, 42, 0.9);
        border: 1px solid rgba(115, 126, 180, 0.5);
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .pill-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #16c47f;
        box-shadow: 0 0 0 6px rgba(22, 196, 127, 0.18);
      }

      .btn-secondary {
        border-radius: var(--radius-pill);
        padding: 7px 16px;
        border: 1px solid rgba(105, 114, 168, 0.8);
        background: rgba(10, 13, 40, 0.9);
        color: var(--text);
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-secondary:hover {
        background: rgba(17, 22, 63, 0.95);
      }

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 1.4fr 1.0fr 1.2fr;
        gap: 16px;
        min-height: 0;
      }

      .column {
        background: linear-gradient(145deg, var(--bg-elevated), var(--bg-elevated-softer));
        border-radius: var(--radius-lg);
        padding: 12px 12px 10px;
        box-shadow: var(--shadow-soft);
        border: 1px solid rgba(32, 40, 84, 0.9);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .column-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .column-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(33, 40, 92, 0.9);
        border: 1px solid rgba(72, 84, 176, 0.9);
        color: var(--text-muted);
      }

      .column-body {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        position: relative;
      }

      .scroll-panel {
        position: absolute;
        inset: 0;
        padding: 4px 4px 6px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(70, 194, 255, 0.55) rgba(5, 7, 18, 0.6);
      }

      .scroll-panel::-webkit-scrollbar {
        width: 7px;
      }
      .scroll-panel::-webkit-scrollbar-track {
        background: rgba(5, 7, 18, 0.8);
      }
      .scroll-panel::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        border-radius: 999px;
      }

      /* Conversation */
      #conversation-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-bottom: 64px;
      }

      .msg {
        max-width: 92%;
        padding: 9px 11px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.45;
        position: relative;
        box-shadow: 0 8px 22px rgba(1, 3, 22, 0.8);
        animation: fadeInUp 0.16s ease-out;
      }

      .msg-user {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--accent-strong), #73ffe6);
        color: #02030d;
        border-bottom-right-radius: 4px;
      }

      .msg-assistant {
        align-self: flex-start;
        background: radial-gradient(circle at top left, #20275a, #070b25);
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(71, 83, 168, 0.8);
      }

      .msg-reasoning {
        align-self: stretch;
        border-radius: 12px;
        border: 1px dashed rgba(107, 126, 211, 0.7);
        background: radial-gradient(circle at top, rgba(70, 194, 255, 0.18), rgba(7, 10, 34, 0.9));
        color: var(--text);
        font-size: 12px;
      }

      .msg-meta {
        margin-top: 3px;
        font-size: 10px;
        color: var(--text-muted);
        opacity: 0.8;
      }

      .markdown {
        font-size: 13px;
      }

      .markdown h1,
      .markdown h2,
      .markdown h3 {
        font-size: 14px;
        margin: 6px 0 4px;
      }

      .markdown p {
        margin: 3px 0;
      }

      .markdown ul,
      .markdown ol {
        padding-left: 18px;
        margin: 3px 0;
      }

      .markdown code {
        background: rgba(5, 10, 35, 0.9);
        padding: 1px 4px;
        border-radius: 4px;
        font-size: 12px;
      }

      .markdown pre {
        background: rgba(4, 7, 28, 0.95);
        padding: 8px 9px;
        border-radius: 8px;
        overflow-x: auto;
        border: 1px solid rgba(62, 77, 155, 0.95);
      }

      /* Input area */
      .input-shell {
        margin-top: 6px;
        padding: 7px 9px;
        border-radius: var(--radius-md);
        background: linear-gradient(145deg, rgba(7, 9, 32, 0.98), rgba(14, 19, 55, 0.98));
        border: 1px solid rgba(54, 66, 135, 0.9);
        display: flex;
        align-items: flex-end;
        gap: 8px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.7);
      }

      #user-input {
        flex: 1;
        resize: none;
        min-height: 42px;
        max-height: 80px;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 13px;
        line-height: 1.4;
        font-family: inherit;
      }

      #send-btn {
        border-radius: 999px;
        border: none;
        padding: 8px 14px;
        background: linear-gradient(135deg, var(--accent), #73ffe6);
        color: #020111;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 10px 26px rgba(16, 199, 213, 0.65);
      }

      #send-btn[disabled] {
        opacity: 0.5;
        cursor: default;
        box-shadow: none;
      }

      .send-icon {
        transform: translateY(0.5px);
      }

      /* Todos */
      #todos-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .todo-card {
        border-radius: 12px;
        padding: 7px 8px;
        background: radial-gradient(circle at top left, #202652, #070924);
        border: 1px solid rgba(55, 65, 130, 0.95);
        font-size: 12px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.65);
      }

      .todo-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 4px;
      }

      .todo-title {
        font-weight: 500;
        font-size: 12px;
      }

      .todo-id {
        font-size: 10px;
        color: var(--text-muted);
      }

      .todo-status-badge {
        border-radius: 999px;
        font-size: 10px;
        padding: 2px 8px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .todo-status-pending {
        background: rgba(68, 90, 255, 0.16);
        color: rgba(173, 187, 255, 0.96);
        border: 1px solid rgba(102, 132, 255, 0.8);
      }

      .todo-status-in_progress {
        background: rgba(70, 194, 255, 0.2);
        color: #e8f7ff;
        border: 1px solid rgba(70, 194, 255, 0.9);
      }

      .todo-status-done {
        background: rgba(84, 233, 181, 0.15);
        color: #d6ffe9;
        border: 1px solid rgba(84, 233, 181, 0.9);
      }

      .todo-status-removed {
        background: rgba(91, 99, 138, 0.25);
        color: rgba(174, 179, 214, 0.9);
        border: 1px dashed rgba(124, 132, 175, 0.9);
      }

      .todo-body {
        margin-top: 4px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .todo-footer {
        margin-top: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        color: var(--text-muted);
      }

      /* Tools & summary */
      .tools-section {
        margin-bottom: 8px;
      }

      .tools-section h3 {
        margin: 0 0 5px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-muted);
      }

      #tool-log {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .tool-entry {
        border-radius: 10px;
        padding: 6px 8px;
        background: radial-gradient(circle at top left, #202755, #050719);
        border: 1px solid rgba(53, 66, 136, 0.95);
        font-size: 11px;
      }

      .tool-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2px;
      }

      .tool-name {
        font-weight: 500;
      }

      .tool-meta {
        font-size: 10px;
        color: var(--text-muted);
      }

      .tool-type-chip {
        border-radius: 999px;
        padding: 1px 7px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        background: rgba(12, 18, 55, 0.98);
        border: 1px solid rgba(68, 80, 158, 0.95);
        color: var(--text-muted);
      }

      .tool-payload {
        margin-top: 3px;
        padding: 5px 6px;
        border-radius: 7px;
        background: rgba(2, 5, 19, 0.95);
        border: 1px solid rgba(38, 49, 112, 0.95);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 11px;
        max-height: 140px;
        overflow: auto;
        white-space: pre;
      }

      #summary-markdown {
        font-size: 12px;
        color: var(--text);
      }

      #summary-markdown .markdown {
        font-size: 12px;
      }

      /* Status */
      .status-bar {
        margin-top: 4px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: var(--text-muted);
      }

      .status-main {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .thinking-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(70, 194, 255, 0.3);
        animation: pulse 1.3s ease-out infinite;
      }

      .status-error {
        color: var(--danger);
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(70, 194, 255, 0.4);
        }
        70% {
          transform: scale(1.06);
          box-shadow: 0 0 0 9px rgba(70, 194, 255, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(70, 194, 255, 0);
        }
      }

      /* Responsive */
      @media (max-width: 1040px) {
        .main-layout {
          grid-template-columns: 1.3fr 1.1fr;
          grid-template-rows: auto auto;
        }
        .column-tools {
          grid-column: 1 / -1;
          min-height: 260px;
        }
      }

      @media (max-width: 780px) {
        #app {
          padding: 10px;
        }
        .main-layout {
          grid-template-columns: 1fr;
        }
        .column {
          min-height: 220px;
        }
        header.top-nav {
          padding: 10px 12px;
        }
        .brand-text-subtitle {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="top-nav">
        <div class="brand">
          <div class="brand-mark"></div>
          <div>
            <div class="brand-text-title">Agentic Mongo Assistant</div>
            <div class="brand-text-subtitle">Planner · Tools · Summarizer · Streaming</div>
          </div>
        </div>
        <div class="nav-controls">
          <div class="pill">
            <span class="pill-dot"></span>
            <span id="connection-status-text">Connected to OSS model</span>
          </div>
          <button class="btn-secondary" id="clear-btn" type="button">
            Clear view
          </button>
        </div>
      </header>

      <main class="main-layout">
        <!-- Conversation column -->
        <section class="column column-conversation">
          <div class="column-header">
            <div class="column-title">Conversation</div>
            <span class="badge" id="session-pill">Session: &mdash;</span>
          </div>
          <div class="column-body">
            <div class="scroll-panel">
              <div id="conversation-list"></div>
            </div>
          </div>
          <div class="status-bar">
            <div class="status-main">
              <span class="thinking-dot" id="stream-indicator" style="visibility: hidden"></span>
              <span id="status-text">Idle</span>
            </div>
            <div id="error-text" class="status-error"></div>
          </div>
          <div class="input-shell">
            <textarea
              id="user-input"
              placeholder="Ask the agent to inspect or remediate your Mongo data..."
            ></textarea>
            <button id="send-btn" type="button">
              <span class="send-icon">➤</span>
              <span>Send</span>
            </button>
          </div>
        </section>

        <!-- Todos column -->
        <section class="column column-todos">
          <div class="column-header">
            <div class="column-title">Plan & Todos</div>
            <span class="badge" id="cycle-pill">Cycle: 0</span>
          </div>
          <div class="column-body">
            <div class="scroll-panel">
              <div id="todos-list"></div>
            </div>
          </div>
        </section>

        <!-- Tools and summary column -->
        <section class="column column-tools">
          <div class="column-header">
            <div class="column-title">Tools & Outcome</div>
          </div>
          <div class="column-body">
            <div class="scroll-panel">
              <div class="tools-section">
                <h3>Tool calls & results</h3>
                <div id="tool-log"></div>
              </div>
              <div class="tools-section">
                <h3>Summary</h3>
                <div id="summary-markdown"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Markdown + sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
      // --- Simple state ---
      const state = {
        sessionId: null,
        messages: [],
        todos: new Map(), // id -> todo object
        toolEvents: [],
        summary: null,
        reasoningBuffer: "",
        streaming: false,
        hasError: false,
        controller: null,
        cycle: 0,
      };

      // --- Helpers ---
      function uuid() {
        if (crypto.randomUUID) return crypto.randomUUID();
        return "xxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
          const r = (Math.random() * 16) | 0;
          const v = c === "x" ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });
      }

      function setStatus(text) {
        const el = document.getElementById("status-text");
        if (el) el.textContent = text;
      }

      function setError(text) {
        const el = document.getElementById("error-text");
        if (el) el.textContent = text || "";
        state.hasError = !!text;
      }

      function setStreaming(isStreaming) {
        state.streaming = isStreaming;
        const dot = document.getElementById("stream-indicator");
        const sendBtn = document.getElementById("send-btn");
        if (dot) dot.style.visibility = isStreaming ? "visible" : "hidden";
        if (sendBtn) sendBtn.disabled = isStreaming;
        setStatus(isStreaming ? "Agent is working..." : "Idle");
      }

      function safeMarkdownToHtml(markdownText) {
        if (!markdownText) return "";
        const html = marked.parse(markdownText, { breaks: true, gfm: true });
        return DOMPurify.sanitize(html);
      }

      function appendMessage(role, content, opts = {}) {
        state.messages.push({
          role,
          content,
          at: new Date(),
          ...opts,
        });
        renderConversation();
      }

      // --- Rendering: Conversation ---
      function renderConversation() {
        const list = document.getElementById("conversation-list");
        if (!list) return;
        list.innerHTML = "";

        for (const msg of state.messages) {
          const div = document.createElement("div");
          let cls = "msg msg-assistant";
          if (msg.role === "user") cls = "msg msg-user";
          else if (msg.role === "reasoning") cls = "msg msg-reasoning";
          div.className = cls;

          const body = document.createElement("div");
          if (msg.isMarkdown) {
            body.className = "markdown";
            body.innerHTML = safeMarkdownToHtml(msg.content);
          } else {
            body.textContent = msg.content;
          }
          div.appendChild(body);

          if (msg.meta) {
            const metaEl = document.createElement("div");
            metaEl.className = "msg-meta";
            metaEl.textContent = msg.meta;
            div.appendChild(metaEl);
          }

          list.appendChild(div);
        }

        // If we have a live reasoning buffer, show it as the last reasoning block.
        if (state.reasoningBuffer) {
          const div = document.createElement("div");
          div.className = "msg msg-reasoning";

          const body = document.createElement("div");
          body.className = "markdown";
          body.innerHTML = safeMarkdownToHtml(state.reasoningBuffer);
          div.appendChild(body);

          const metaEl = document.createElement("div");
          metaEl.className = "msg-meta";
          metaEl.textContent = "Streaming model reasoning...";
          div.appendChild(metaEl);

          list.appendChild(div);
        }

        const scrollPanel = list.parentElement;
        if (scrollPanel) {
          scrollPanel.scrollTop = scrollPanel.scrollHeight;
        }
      }

      // --- Rendering: Todos ---
      function renderTodos() {
        const list = document.getElementById("todos-list");
        const cyclePill = document.getElementById("cycle-pill");
        if (cyclePill) {
          cyclePill.textContent = `Cycle: ${state.cycle}`;
        }
        if (!list) return;
        list.innerHTML = "";

        const todosArr = Array.from(state.todos.values());
        if (todosArr.length === 0) {
          const empty = document.createElement("div");
          empty.style.fontSize = "11px";
          empty.style.color = "var(--text-muted)";
          empty.textContent = "Planner todos will appear here once generated.";
          list.appendChild(empty);
          return;
        }

        for (const todo of todosArr) {
          const card = document.createElement("div");
          card.className = "todo-card";
          if (todo._removed) {
            card.style.opacity = "0.7";
          }

          const header = document.createElement("div");
          header.className = "todo-header";
          const title = document.createElement("div");
          title.className = "todo-title";
          title.textContent = todo.title || "(untitled todo)";
          header.appendChild(title);

          const statusBadge = document.createElement("div");
          const statusKey =
            todo.status === "in_progress" || todo.status === "in progress"
              ? "in_progress"
              : todo.status;
          statusBadge.className = `todo-status-badge todo-status-${statusKey}`;
          statusBadge.textContent =
            statusKey === "in_progress"
              ? "IN PROGRESS"
              : statusKey === "done"
              ? "DONE"
              : statusKey === "removed"
              ? "REMOVED"
              : "PENDING";
          header.appendChild(statusBadge);

          card.appendChild(header);

          const idEl = document.createElement("div");
          idEl.className = "todo-id";
          idEl.textContent = `ID: ${todo.id}`;
          card.appendChild(idEl);

          if (todo.description) {
            const body = document.createElement("div");
            body.className = "todo-body";
            body.textContent = todo.description;
            card.appendChild(body);
          }

          const footer = document.createElement("div");
          footer.className = "todo-footer";
          const left = document.createElement("span");
          left.textContent = todo.cycle != null ? `Cycle ${todo.cycle}` : "Cycle –";
          const right = document.createElement("span");
          right.textContent = todo.updatedAt
            ? new Date(todo.updatedAt).toLocaleTimeString()
            : "";
          footer.appendChild(left);
          footer.appendChild(right);
          card.appendChild(footer);

          list.appendChild(card);
        }
      }

      // --- Rendering: Tools ---
      function renderTools() {
        const log = document.getElementById("tool-log");
        if (!log) return;
        log.innerHTML = "";
        if (state.toolEvents.length === 0) {
          const empty = document.createElement("div");
          empty.style.fontSize = "11px";
          empty.style.color = "var(--text-muted)";
          empty.textContent = "Tool calls and results will appear here.";
          log.appendChild(empty);
          return;
        }

        for (const ev of state.toolEvents) {
          const entry = document.createElement("div");
          entry.className = "tool-entry";

          const header = document.createElement("div");
          header.className = "tool-header";

          const left = document.createElement("div");
          const nameEl = document.createElement("span");
          nameEl.className = "tool-name";
          nameEl.textContent = ev.name;
          left.appendChild(nameEl);
          if (ev.cycle != null || ev.iteration != null) {
            const meta = document.createElement("span");
            meta.className = "tool-meta";
            const parts = [];
            if (ev.cycle != null) parts.push(`cycle ${ev.cycle}`);
            if (ev.iteration != null) parts.push(`step ${ev.iteration}`);
            meta.textContent = " · " + parts.join(" · ");
            left.appendChild(meta);
          }

          const chip = document.createElement("span");
          chip.className = "tool-type-chip";
          chip.textContent = ev.type === "call" ? "CALL" : "RESULT";

          header.appendChild(left);
          header.appendChild(chip);
          entry.appendChild(header);

          const payload = document.createElement("div");
          payload.className = "tool-payload";
          try {
            payload.textContent = JSON.stringify(ev.payload, null, 2);
          } catch {
            payload.textContent = String(ev.payload);
          }
          entry.appendChild(payload);

          log.appendChild(entry);
        }
      }

      // --- Rendering: Summary ---
      function renderSummary() {
        const container = document.getElementById("summary-markdown");
        if (!container) return;
        container.innerHTML = "";
        if (!state.summary) {
          const empty = document.createElement("div");
          empty.style.fontSize = "11px";
          empty.style.color = "var(--text-muted)";
          empty.textContent = "Once the agent finishes, a summary will appear here.";
          container.appendChild(empty);
          return;
        }
        const md = [];
        if (state.summary.summary) md.push(state.summary.summary);
        if (state.summary.details) {
          md.push("");
          md.push(state.summary.details);
        }
        const div = document.createElement("div");
        div.className = "markdown";
        div.innerHTML = safeMarkdownToHtml(md.join("\n\n"));
        container.appendChild(div);
      }

      // --- SSE handling over fetch ---
      async function streamChat(message) {
        if (!state.sessionId) {
          state.sessionId = uuid();
          const pill = document.getElementById("session-pill");
          if (pill) pill.textContent = `Session: ${state.sessionId.slice(0, 8)}`;
        }

        setError("");
        setStreaming(true);

        // reset per-request UI state, but preserve messages for context
        state.reasoningBuffer = "";
        state.toolEvents = [];
        renderTools();
        state.summary = null;
        renderSummary();

        const url = "/agent/chat/stream";
        const controller = new AbortController();
        state.controller = controller;

        const payload = {
          session_id: state.sessionId,
          message,
          metadata: {},
        };

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });

          if (!res.ok || !res.body) {
            setError(`HTTP ${res.status} from server`);
            setStreaming(false);
            return;
          }

          const reader = res.body.getReader();
          const decoder = new TextDecoder("utf-8");
          let buffer = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            let boundary = buffer.indexOf("\n\n");
            while (boundary !== -1) {
              const chunk = buffer.slice(0, boundary);
              buffer = buffer.slice(boundary + 2);
              handleSseChunk(chunk);
              boundary = buffer.indexOf("\n\n");
            }
          }
        } catch (err) {
          if (err.name !== "AbortError") {
            console.error("Stream error", err);
            setError("Stream error. See console for details.");
          }
        } finally {
          setStreaming(false);
          state.controller = null;
        }
      }

      function handleSseChunk(raw) {
        if (!raw.trim()) return;
        const lines = raw.split(/\r?\n/);
        let eventType = "message";
        let dataLines = [];
        for (const line of lines) {
          if (line.startsWith("event:")) {
            eventType = line.slice(6).trim();
          } else if (line.startsWith("data:")) {
            dataLines.push(line.slice(5).trim());
          }
        }
        const dataStr = dataLines.join("\n");
        let data;
        try {
          data = dataStr ? JSON.parse(dataStr) : {};
        } catch (e) {
          console.warn("Failed to parse SSE data JSON", e, dataStr);
          return;
        }
        handleEvent(eventType, data);
      }

      function handleEvent(type, data) {
        switch (type) {
          case "start":
            setStatus("Agent is working...");
            break;
          case "model_stream":
            if (typeof data.delta === "string") {
              state.reasoningBuffer += data.delta;
              renderConversation();
            }
            break;
          case "planner_reasoning":
            state.cycle = data.cycle ?? 0;
            // finalize buffer into a message, then clear it
            if (state.reasoningBuffer.trim()) {
              appendMessage("reasoning", state.reasoningBuffer, {
                isMarkdown: true,
                meta: `Model reasoning (live stream)`,
              });
              state.reasoningBuffer = "";
            }
            if (data.reasoning) {
              appendMessage("assistant", data.reasoning, {
                isMarkdown: true,
                meta: `Planner reasoning · cycle ${state.cycle}`,
              });
            }
            break;
          case "planner_todos":
            state.cycle = data.cycle ?? state.cycle ?? 0;
            state.todos.clear();
            if (Array.isArray(data.todos)) {
              for (const t of data.todos) {
                if (!t || !t.id) continue;
                state.todos.set(t.id, {
                  ...t,
                  cycle: state.cycle,
                  updatedAt: Date.now(),
                });
              }
            }
            renderTodos();
            break;
          case "agent_step":
            if (Array.isArray(data.todos)) {
              state.todos.clear();
              for (const t of data.todos) {
                if (!t || !t.id) continue;
                state.todos.set(t.id, {
                  ...t,
                  updatedAt: Date.now(),
                });
              }
              renderTodos();
            }
            if (data.step_explanation) {
              appendMessage("assistant", data.step_explanation, {
                isMarkdown: true,
                meta: "Execution step",
              });
            }
            break;
          case "tool_call":
            state.toolEvents.push({
              type: "call",
              name: data.name,
              payload: data.input,
              at: Date.now(),
              cycle: state.cycle,
              iteration: data.iteration,
            });
            renderTools();
            break;
          case "tool_result":
            state.toolEvents.push({
              type: "result",
              name: data.name,
              payload: data.result,
              at: Date.now(),
              cycle: state.cycle,
              iteration: data.iteration,
            });
            renderTools();
            break;
          case "summary":
            state.summary = data;
            renderSummary();
            if (data && data.summary) {
              appendMessage("assistant", data.summary, {
                isMarkdown: true,
                meta: data.needs_more_planning
                  ? "Interim summary (more planning required)"
                  : "Final summary",
              });
            }
            break;
          case "agent_abort":
            setError("Agent aborted: " + (data.reason || "max iterations reached"));
            break;
          case "error":
            setError(
              `Agent error (${data.status_code ?? "?"}): ${
                typeof data.detail === "string" ? data.detail : "see logs"
              }`
            );
            break;
          case "end":
            setStatus("Finished");
            break;
          default:
            break;
        }
      }

      // --- Event wiring ---
      function init() {
        const input = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const clearBtn = document.getElementById("clear-btn");

        if (sendBtn && input) {
          sendBtn.addEventListener("click", () => {
            const text = input.value.trim();
            if (!text || state.streaming) return;
            appendMessage("user", text, { isMarkdown: false, meta: "You" });
            input.value = "";
            streamChat(text);
          });

          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              sendBtn.click();
            }
          });
        }

        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            if (state.controller) {
              state.controller.abort();
            }
            // Clear UI state but keep session id so context stays
            state.messages = [];
            state.todos.clear();
            state.toolEvents = [];
            state.summary = null;
            state.reasoningBuffer = "";
            state.hasError = false;
            setError("");
            setStreaming(false);
            renderConversation();
            renderTodos();
            renderTools();
            renderSummary();
          });
        }

        renderConversation();
        renderTodos();
        renderTools();
        renderSummary();
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
